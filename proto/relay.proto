syntax = "proto3";
package relay;

service ClientRelay {
  rpc Subscribe(SubscribeRequest) returns (stream ServerEvent);
  rpc Ping(PingRequest) returns (PingResponse);
}

message SubscribeRequest {
  string auth_token = 1;
  string pairing_id = 2;
}

message ServerEvent {
  oneof event {
    SessionToken session_token = 1;
    MobileConnected mobile_connected = 2;
    MobileDisconnected mobile_disconnected = 3;
    ClipboardText clipboard_text = 4;
    Ping ping = 5;
  }
  // 服务端在首帧 SessionToken 事件中附带的 gRPC 会话令牌，用于后续 Ping 鉴权。
  string grpc_session_token = 6;
}

message SessionToken {
  string token = 1;
  string url = 2;
}

message MobileConnected {
  string device_info = 1;
}

message MobileDisconnected {}

message ClipboardText {
  string content = 1;
}

message Ping {}

message PingRequest {
  string grpc_session_token = 1;
}

message PingResponse {}
