[package]
name = "client"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
eframe = "0.34"
egui = "0.34"
egui-cjk-font = "0.2"
tokio = { version = "1.50", features = ["full"] }
tonic = { version = "0.14", features = [
    "tls-native-roots",
    "tls-webpki-roots",
] }
tonic-prost = "0.14"
prost = "0.14"
qrcode = "0.14"
image = { version = "0.25", features = ["png"] }
tray-icon = "0.21"
arboard = "3.6"
enigo = "0.6"
serde = { version = "1.0", features = ["derive"] }
toml = "1.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rustls = "0.23"
common = { path = "../common" }

[build-dependencies]
tonic-prost-build = "0.14"
winresource = "0.1"

[[bin]]
name = "client"
path = "src/main.rs"
