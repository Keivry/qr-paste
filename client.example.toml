# client 会优先读取 client.exe 同目录下的 client.toml；
# 若不存在，则回退到当前工作目录。

# 必填：服务端主机名 / IP，或完整 gRPC 入口 URL
# 直连示例："example.com"
# 经 HTTPS/TLS 反向代理（如 nginx/HAProxy）示例："https://grpc.example.com"
server_host = "example.com"

# 必填：gRPC 鉴权令牌，必须与 server.toml 中的 grpc_auth_token 一致
# 注意：该令牌会明文保存在本地配置文件中，请勿提交到仓库
grpc_auth_token = "change-this-long-random-token"

# gRPC 端口：裸主机名 / http:// 默认 50051；https:// 默认 443；当 server_host 已显式包含端口时会被忽略
# 如需覆盖默认值可取消注释，例如：
# grpc_port = 50051

# pairing_id 会在首次启动时自动生成并写回 client.toml，用于稳定标识当前 PC；不建议手动修改
# pairing_id = "00000000-0000-4000-8000-000000000000"

# 是否启用自动粘贴（收到文本后模拟 Ctrl+V），默认 false
auto_paste = false

# [已废弃] 自动粘贴后是否自动按下回车键，默认 false
# 请改用 emulation_key_after_paste = "Return" 代替此项
# enter_after_paste = false

# 自动粘贴完成后模拟按下的按键（仅在 auto_paste = true 时生效），默认不按任何键
# 支持格式："Return"、"Tab"、"Escape"、"Space"、"Backspace"、"Delete"
# 也支持 "Up"/"Down"/"Left"/"Right"、"F1"-"F12"、"Home"/"End"、"PageUp"/"PageDown"
# 也支持带单个修饰键：如 "ctrl+Return"、"shift+Tab"、"alt+PageDown"、"meta+Right"
# emulation_key_after_paste = "Return"

# 自动粘贴前的延迟毫秒数（等待剪贴板写入完成），默认 150
paste_delay_ms = 150

# gRPC 心跳间隔（秒），默认 30；设为 0 可禁用客户端主动 Ping
# 用于在扫码等待或已连接期间维持长连接活性
heartbeat_interval_secs = 30

# 断线或心跳异常后的最大重试退避间隔（秒），默认 60
# 客户端会按指数退避 + 抖动自动重连，且不会超过该上限
reconnect_max_interval_secs = 60

# 启动时是否最小化到托盘，默认 false
start_minimized = false

# 点击窗口关闭按钮时是否最小化到托盘而不是退出，默认 false
minimize_on_close = false

# 粘贴成功通知显示时长（秒），默认 3
notification_duration_secs = 3

# 自动粘贴后是否还原剪贴板为粘贴前内容，默认 false
# 仅在 auto_paste = true 时生效；粘贴后尽力还原为原始文本；
# 若原始内容为非文本（图片等）或读取失败，还原步骤将静默跳过；此功能属最佳努力
# delete_clipboard_after_paste = false
